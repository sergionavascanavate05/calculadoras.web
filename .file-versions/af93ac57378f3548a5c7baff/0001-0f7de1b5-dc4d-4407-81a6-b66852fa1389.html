<!doctype html>
<html lang="es">
<head><meta charset="utf-8" /><meta name="viewport" content="width=device-width, initial-scale=1" /><title>Header</title><link rel="stylesheet" href="../../colors_and_type.css" />
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--color-bg);font-family:var(--font-body);-webkit-font-smoothing:antialiased}
header{position:sticky;top:0;z-index:50;background:color-mix(in oklch,var(--color-bg) 80%,transparent);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-bottom:1px solid var(--color-border)}
.header-inner{max-width:1200px;margin:0 auto;padding:0 16px;height:64px;display:flex;align-items:center;justify-content:space-between}
.logo{display:flex;align-items:center;gap:8px;text-decoration:none;font-family:var(--font-display);font-weight:600;font-size:18px;letter-spacing:-0.02em;color:var(--color-fg);transition:color 0.15s}
.logo:hover{color:var(--color-accent)}
.logo-mark{color:var(--color-accent);font-size:22px;font-weight:700}
.nav-desktop{display:flex;align-items:center;gap:4px}
.nav-desktop a{padding:8px 12px;font-size:14px;color:var(--color-muted);text-decoration:none;border-radius:8px;transition:all 0.15s}
.nav-desktop a:hover{color:var(--color-fg);background:var(--color-surface)}
.theme-btn{width:36px;height:36px;display:grid;place-items:center;border-radius:8px;border:1px solid var(--color-border);background:var(--color-surface);color:var(--color-muted);cursor:pointer;margin-left:12px;transition:all 0.15s}
.theme-btn:hover{color:var(--color-fg);background:var(--color-border)}
.mobile-hamburger{display:none;width:36px;height:36px;align-items:center;justify-content:center;border-radius:8px;border:1px solid var(--color-border);background:transparent;color:var(--color-muted);cursor:pointer;margin-left:8px}
@media(max-width:768px){.nav-desktop{display:none}.mobile-hamburger{display:flex}}
</style>
</head>
<body>
<header>
  <div class="header-inner">
    <a href="#" class="logo"><span class="logo-mark">#</span> Calculadoras</a>
    <nav class="nav-desktop">
      <a href="#">Inicio</a>
      <a href="#">Calculadoras</a>
      <a href="#">Blog</a>
      <button class="theme-btn" aria-label="Modo oscuro"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.752 15.002A9.72 9.72 0 0118 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 003 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 009.002-5.998z"/></svg></button>
    </nav>
    <div class="mobile-hamburger"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5"/></svg></div>
  </div>
</header>
<div style="padding:32px;max-width:1200px;margin:0 auto;color:var(--color-muted);font-size:14px"><p>Header sticky con navegación responsive. El botón de tema alterna modo oscuro/claro.</p></div>
<script>
document.querySelector('.theme-btn')?.addEventListener('click',function(){document.documentElement.classList.toggle('dark')});
</script>
</body>
</html>
