<!doctype html>
<html lang="es">
<head><meta charset="utf-8" /><meta name="viewport" content="width=device-width, initial-scale=1" /><title>IMC Form</title><link rel="stylesheet" href="../../colors_and_type.css" />
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--color-bg);font-family:var(--font-body);-webkit-font-smoothing:antialiased;padding:32px;display:flex;justify-content:center}
.container{max-width:600px;width:100%}
.page-heading{margin-bottom:32px}
.page-heading h1{font-family:var(--font-display);font-weight:700;font-size:28px;color:var(--color-fg);letter-spacing:-0.02em}
.page-heading p{margin-top:8px;color:var(--color-muted);font-size:14px;line-height:1.5}
.form-card{border:1px solid var(--color-border);border-radius:12px;background:var(--color-surface);padding:24px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
@media(max-width:500px){.form-row{grid-template-columns:1fr}}
.field label{display:block;font-size:14px;font-weight:500;color:var(--color-fg);margin-bottom:6px}
.field input{width:100%;padding:10px 12px;border-radius:8px;border:1px solid var(--color-border);background:var(--color-bg);color:var(--color-fg);font-size:14px;font-family:var(--font-body);outline:none;transition:all 0.15s}
.field input:focus{border-color:var(--color-accent);box-shadow:0 0 0 2px color-mix(in oklch,var(--color-accent) 30%,transparent)}
.field input::placeholder{color:color-mix(in oklch,var(--color-muted) 50%,transparent)}
.error-text{color:var(--color-error);font-size:14px;margin-bottom:12px}
.actions{display:flex;gap:12px}
.btn-primary{padding:10px 24px;border-radius:12px;background:var(--color-accent);color:white;border:0;font-size:14px;font-weight:500;font-family:var(--font-body);cursor:pointer;transition:background 0.2s}
.btn-primary:hover{background:var(--color-accent-hover)}
.btn-secondary{padding:10px 24px;border-radius:12px;border:1px solid var(--color-border);background:transparent;color:var(--color-muted);font-size:14px;font-weight:500;font-family:var(--font-body);cursor:pointer;transition:all 0.2s}
.btn-secondary:hover{color:var(--color-fg);background:var(--color-border)}
.result-card{margin-top:24px;border:1px solid var(--color-border);border-radius:12px;background:var(--color-surface);padding:24px;animation:slideUp 0.4s ease-out}
.result-circle{display:flex;flex-direction:column;align-items:center;margin-bottom:20px}
.badge{width:80px;height:80px;border-radius:9999px;display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:700;color:white;background:oklch(55% 0.15 145)}
.badge-label{font-family:var(--font-display);font-weight:600;color:var(--color-fg);margin-top:8px}
.result-rows{display:flex;flex-direction:column;gap:8px}
.result-row{display:flex;justify-content:space-between;align-items:center;padding:8px 12px;border-radius:8px;background:var(--color-bg)}
.result-row .label{font-size:14px;color:var(--color-muted)}
.result-row .label .desc{display:block;font-size:12px;color:color-mix(in oklch,var(--color-muted) 70%,transparent)}
.result-row .value{font-family:var(--font-display);font-weight:600;color:var(--color-fg)}
@keyframes slideUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<div class="container">
  <div class="page-heading">
    <h1>Calculadora de IMC</h1>
    <p>El Índice de Masa Corporal (IMC) es una medida que relaciona el peso y la altura para estimar si tu peso se encuentra dentro de un rango saludable.</p>
  </div>
  <div class="form-card" data-od-id="imc-form">
    <div class="form-row">
      <div class="field"><label for="peso">Peso (kg)</label><input id="peso" type="number" step="0.1" min="1" max="500" placeholder="Ej: 70" /></div>
      <div class="field"><label for="altura">Altura (cm)</label><input id="altura" type="number" step="0.5" min="1" max="300" placeholder="Ej: 175" /></div>
    </div>
    <div class="actions">
      <button class="btn-primary" id="calcBtn">Calcular IMC</button>
      <button class="btn-secondary" id="resetBtn" style="display:none">Reiniciar</button>
    </div>
  </div>
</div>
<script>
const calcBtn=document.getElementById('calcBtn'),resetBtn=document.getElementById('resetBtn');
const peso=document.getElementById('peso'),altura=document.getElementById('altura');
function calcularIMC(p,a){const m=a/100,imc=p/(m*m);return Math.round(imc*10)/10}
function clasificarIMC(v){if(v<16)return['Delgadez severa','oklch(55% 0.2 30)'];if(v<17)return['Delgadez moderada','oklch(60% 0.18 40)'];if(v<18.5)return['Delgadez leve','oklch(65% 0.15 50)'];if(v<25)return['Normal','oklch(55% 0.15 145)'];if(v<30)return['Sobrepeso','oklch(60% 0.18 80)'];if(v<35)return['Obesidad grado I','oklch(55% 0.2 30)'];if(v<40)return['Obesidad grado II','oklch(50% 0.22 25)'];return['Obesidad grado III','oklch(45% 0.25 20)']}
calcBtn.addEventListener('click',function(){
  const p=parseFloat(peso.value),a=parseFloat(altura.value);
  if(!p||p<=0||p>500)return alert('Introduce un peso válido (1-500 kg)');
  if(!a||a<=0||a>300)return alert('Introduce una altura válida (1-300 cm)');
  const imc=calcularIMC(p,a);
  const[clasif,color]=clasificarIMC(imc);
  const m=a/100,min=18.5*m*m,max=24.9*m*m;
  const existing=document.querySelector('.result-card');
  if(existing)existing.remove();
  const card=document.createElement('div');card.className='result-card';
  card.innerHTML='<div class="result-circle"><div class="badge" style="background:'+color+'">'+imc+'</div><div class="badge-label">'+clasif+'</div></div><div class="result-rows"><div class="result-row"><span class="label">Tu IMC</span><span class="value">'+imc+' kg/m²</span></div><div class="result-row"><span class="label">Clasificación</span><span class="value">'+clasif+'</span></div><div class="result-row"><span class="label">Peso saludable mínimo<span class="desc">Para IMC 18.5</span></span><span class="value">'+Math.round(min*10)/10+' kg</span></div><div class="result-row"><span class="label">Peso saludable máximo<span class="desc">Para IMC 24.9</span></span><span class="value">'+Math.round(max*10)/10+' kg</span></div></div>';
  document.querySelector('.container').appendChild(card);
  resetBtn.style.display='';
});
resetBtn.addEventListener('click',function(){peso.value='';altura.value='';const r=document.querySelector('.result-card');if(r)r.remove();resetBtn.style.display='none'});
</script>
</body>
</html>
