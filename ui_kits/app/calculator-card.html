<!doctype html>
<html lang="es">
<head><meta charset="utf-8" /><meta name="viewport" content="width=device-width, initial-scale=1" /><title>CalculatorCard</title><link rel="stylesheet" href="../../colors_and_type.css" />
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--color-bg);font-family:var(--font-body);-webkit-font-smoothing:antialiased;padding:32px;display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;max-width:1200px;margin:0 auto}
.card{display:block;padding:24px;border-radius:12px;border:1px solid var(--color-border);background:var(--color-surface);text-decoration:none;transition:all 0.2s ease}
.card:hover{border-color:color-mix(in oklch,var(--color-accent) 30%,transparent);box-shadow:0 1px 4px rgba(0,0,0,0.06)}
.card-icon{color:var(--color-accent);display:block;margin-bottom:12px}
.card h3{font-family:var(--font-display);font-weight:600;color:var(--color-fg);font-size:16px;transition:color 0.2s}
.card:hover h3{color:var(--color-accent)}
.card p{margin-top:6px;font-size:14px;color:var(--color-muted);line-height:1.5}
.card-cta{display:inline-block;margin-top:12px;font-size:12px;font-weight:500;color:var(--color-accent);text-transform:uppercase;letter-spacing:0.1em}
</style>
</head>
<body>
<a class="card" href="#">
  <span class="card-icon"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20V10"/><path d="M18 20V4"/><path d="M6 20v-4"/></svg></span>
  <h3>Calculadora de IMC</h3>
  <p>Calcula tu Índice de Masa Corporal y descubre tu peso saludable según la OMS.</p>
  <span class="card-cta">Calcular ahora &rarr;</span>
</a>
<a class="card" href="#">
  <span class="card-icon"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"/><path d="M7 16l4-8 4 4 4-6"/></svg></span>
  <h3>Calculadora de IVA</h3>
  <p>Calcula el IVA de cualquier importe al tipo general, reducido o superreducido.</p>
  <span class="card-cta">Calcular ahora &rarr;</span>
</a>
</body>
</html>
