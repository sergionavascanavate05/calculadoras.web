<!doctype html>
<html lang="es">
<head><meta charset="utf-8" /><meta name="viewport" content="width=device-width, initial-scale=1" /><title>404</title><link rel="stylesheet" href="../../colors_and_type.css" />
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--color-bg);font-family:var(--font-body);-webkit-font-smoothing:antialiased;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px}
.page-404{text-align:center;max-width:400px}
.page-404 h1{font-family:var(--font-display);font-weight:700;font-size:60px;color:var(--color-accent);line-height:1}
.page-404 h2{font-family:var(--font-display);font-weight:600;font-size:20px;color:var(--color-fg);margin-top:16px}
.page-404 p{margin-top:8px;font-size:14px;color:var(--color-muted);line-height:1.5}
.page-404 .actions{display:flex;justify-content:center;gap:12px;margin-top:24px}
.btn-primary{display:inline-block;padding:10px 20px;border-radius:12px;background:var(--color-accent);color:white;text-decoration:none;font-size:14px;font-weight:500;transition:background 0.2s}
.btn-primary:hover{background:var(--color-accent-hover)}
.btn-secondary{display:inline-block;padding:10px 20px;border-radius:12px;border:1px solid var(--color-border);color:var(--color-muted);text-decoration:none;font-size:14px;font-weight:500;transition:all 0.2s}
.btn-secondary:hover{color:var(--color-fg);background:var(--color-surface)}
</style>
</head>
<body>
<div class="page-404">
  <h1>404</h1>
  <h2>Página no encontrada</h2>
  <p>La página que buscas no existe o ha sido movida. Prueba con nuestra calculadora de IMC o IVA.</p>
  <div class="actions">
    <a href="#" class="btn-primary">Volver al inicio</a>
    <a href="#" class="btn-secondary">Calculadora de IMC</a>
  </div>
</div>
</body>
</html>
